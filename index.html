    <script>
        function formatSeconds(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;

            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const pad = (num) => String(num).padStart(2, '0');

            return `Do końca zostało: ${pad(hours)}h ${pad(minutes)}m ${pad(seconds)}s`;
        }

        function timer(){
            let now = new Date();
            
            let targetToday = new Date();
            targetToday.setHours(16, 0, 0, 0);

            let TimerDaily = document.querySelector("#TimerDaily");

            if (now >= targetToday) {
                TimerDaily.innerText = "Udało ci się! Idź do domu";
            } else {
                let diffInSeconds = Math.floor((targetToday.getTime() - now.getTime()) / 1000);
                TimerDaily.innerText = formatSeconds(diffInSeconds);
            }
        }

        function highlightCurrentDay() {
            let currentDay = new Date().getDate().toString();
            let cells = document.querySelectorAll("table td");

            cells.forEach(cell => {
                if (cell.innerText.trim() === currentDay) {
                    cell.classList.add("today");
                    let link = cell.querySelector("a");
                    if (link) {
                        link.classList.add("today");
                    }
                }
            });
        }
        highlightCurrentDay();
        setInterval(highlightCurrentDay, 3600000);
        timer();
        setInterval(timer, 1000);
    </script>
